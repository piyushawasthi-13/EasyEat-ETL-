name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: easyeat
          POSTGRES_PASSWORD: easyeat_secret
          POSTGRES_DB: easyeat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U easyeat"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: easyeat
          MONGO_INITDB_ROOT_PASSWORD: easyeat_secret
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      POSTGRES_DSN: postgresql://easyeat:easyeat_secret@localhost:5432/easyeat
      MONGO_URI: mongodb://easyeat:easyeat_secret@localhost:27017
      MONGO_DB: easyeat_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
